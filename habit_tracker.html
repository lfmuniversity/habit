<h2 class="sr-only">Habit tracker per corsa, palestra, dieta, camminata e mobilità con calendario mensile e statistiche</h2>

<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 1rem 0; }
  
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 500; margin: 0; }
  .month-nav { display: flex; gap: 8px; }
  .month-nav button { padding: 6px 10px; font-size: 14px; }
  
  .habits { display: grid; gap: 12px; margin-bottom: 2rem; }
  
  .habit-card { 
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1rem 1.25rem;
  }
  
  .habit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .habit-name { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .habit-icon { font-size: 20px; }
  .streak { 
    font-size: 13px; 
    color: var(--color-text-secondary); 
    display: flex; 
    align-items: center; 
    gap: 4px;
  }
  .streak-fire { color: var(--color-text-warning); }
  
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-label { 
    text-align: center; 
    font-size: 11px; 
    color: var(--color-text-secondary); 
    padding: 4px 0;
    font-weight: 500;
  }
  .day-cell { 
    aspect-ratio: 1; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    border: 0.5px solid transparent;
    position: relative;
  }
  .day-cell:not(.empty):not(.other-month):hover { 
    border-color: var(--color-border-secondary);
  }
  .day-cell.empty { cursor: default; }
  .day-cell.other-month { 
    color: var(--color-text-tertiary);
    opacity: 0.4;
  }
  .day-cell.completed { 
    background: var(--color-background-success);
    color: var(--color-text-success);
    font-weight: 500;
  }
  .day-cell.today { 
    border: 1.5px solid var(--color-border-info);
  }
  
  .stats { 
    display: grid; 
    grid-template-columns: repeat(2, minmax(0, 1fr)); 
    gap: 12px; 
    margin-top: 2rem;
  }
  .stat-card { 
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 1rem;
  }
  .stat-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 500; }
</style>

<div class="header">
  <h1>Le mie abitudini</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">←</button>
    <button onclick="changeMonth(1)">→</button>
  </div>
</div>

<div id="current-month" style="text-align: center; font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem;"></div>

<div class="habits" id="habits-container"></div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Questo mese</div>
    <div class="stat-value" id="month-total">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Streak totale</div>
    <div class="stat-value" id="total-streak">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Tasso completamento</div>
    <div class="stat-value" id="completion-rate">0%</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Migliore abitudine</div>
    <div class="stat-value" id="best-habit" style="font-size: 16px;">-</div>
  </div>
</div>

<script>
const habits = [
  { id: 'corsa', name: 'Corsa', icon: 'ti-run', color: 'teal' },
  { id: 'palestra', name: 'Palestra', icon: 'ti-barbell', color: 'purple' },
  { id: 'dieta', name: 'Dieta', icon: 'ti-apple', color: 'green' },
  { id: 'camminata', name: 'Camminata', icon: 'ti-walk', color: 'blue' },
  { id: 'mobilita', name: 'Mobilità', icon: 'ti-stretching', color: 'coral' }
];

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
const today = new Date();

async function loadData() {
  const data = {};
  for (const habit of habits) {
    try {
      const result = await window.storage.get(`habit-${habit.id}`, false);
      data[habit.id] = result ? JSON.parse(result.value) : {};
    } catch {
      data[habit.id] = {};
    }
  }
  return data;
}

async function saveData(habitId, dates) {
  await window.storage.set(`habit-${habitId}`, JSON.stringify(dates), false);
}

function getDateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
}

function getMonthData(year, month) {
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const prevMonthLastDay = new Date(year, month, 0);
  
  const startDay = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  const prevMonthDays = prevMonthLastDay.getDate();
  
  return { firstDay, lastDay, startDay, daysInMonth, prevMonthDays };
}

function calculateStreak(dates, habitId) {
  const sortedDates = Object.keys(dates[habitId] || {}).sort().reverse();
  if (sortedDates.length === 0) return 0;
  
  let streak = 0;
  let checkDate = new Date(today);
  checkDate.setHours(0, 0, 0, 0);
  
  for (let i = 0; i < 365; i++) {
    const key = getDateKey(checkDate);
    if (dates[habitId][key]) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else {
      if (i === 0 && getDateKey(today) !== key) {
        checkDate.setDate(checkDate.getDate() - 1);
        continue;
      }
      break;
    }
  }
  return streak;
}

async function toggleDate(habitId, date) {
  const data = await loadData();
  const key = getDateKey(date);
  
  if (!data[habitId]) data[habitId] = {};
  
  if (data[habitId][key]) {
    delete data[habitId][key];
  } else {
    data[habitId][key] = true;
  }
  
  await saveData(habitId, data[habitId]);
  await render();
}

function renderCalendar(habit, dates, year, month) {
  const { startDay, daysInMonth, prevMonthDays } = getMonthData(year, month);
  
  let html = '<div class="calendar">';
  
  ['D', 'L', 'M', 'M', 'G', 'V', 'S'].forEach(day => {
    html += `<div class="day-label">${day}</div>`;
  });
  
  for (let i = startDay - 1; i >= 0; i--) {
    const day = prevMonthDays - i;
    html += `<div class="day-cell other-month empty">${day}</div>`;
  }
  
  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const key = getDateKey(date);
    const isCompleted = dates[habit.id] && dates[habit.id][key];
    const isToday = date.getDate() === today.getDate() && 
                    date.getMonth() === today.getMonth() && 
                    date.getFullYear() === today.getFullYear();
    
    const classes = ['day-cell'];
    if (isCompleted) classes.push('completed');
    if (isToday) classes.push('today');
    
    html += `<div class="${classes.join(' ')}" onclick="toggleDate('${habit.id}', new Date(${year}, ${month}, ${day}))">${day}</div>`;
  }
  
  const totalCells = startDay + daysInMonth;
  const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remainingCells; i++) {
    html += `<div class="day-cell other-month empty">${i}</div>`;
  }
  
  html += '</div>';
  return html;
}

async function render() {
  const data = await loadData();
  const container = document.getElementById('habits-container');
  
  const monthNames = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno', 
                      'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];
  document.getElementById('current-month').textContent = `${monthNames[currentMonth]} ${currentYear}`;
  
  let html = '';
  for (const habit of habits) {
    const streak = calculateStreak(data, habit.id);
    
    html += `
      <div class="habit-card">
        <div class="habit-header">
          <div class="habit-name">
            <i class="ti ${habit.icon} habit-icon" aria-hidden="true"></i>
            ${habit.name}
          </div>
          <div class="streak">
            ${streak > 0 ? `<span class="streak-fire">🔥</span> ${streak}` : '0'}
          </div>
        </div>
        ${renderCalendar(habit, data, currentYear, currentMonth)}
      </div>
    `;
  }
  
  container.innerHTML = html;
  
  let monthTotal = 0;
  let totalStreak = 0;
  let habitCounts = {};
  
  for (const habit of habits) {
    const streak = calculateStreak(data, habit.id);
    totalStreak += streak;
    
    const monthStart = new Date(currentYear, currentMonth, 1);
    const monthEnd = new Date(currentYear, currentMonth + 1, 0);
    let count = 0;
    
    for (let d = new Date(monthStart); d <= monthEnd; d.setDate(d.getDate() + 1)) {
      const key = getDateKey(d);
      if (data[habit.id] && data[habit.id][key]) {
        count++;
        monthTotal++;
      }
    }
    habitCounts[habit.name] = count;
  }
  
  document.getElementById('month-total').textContent = Math.round(monthTotal);
  document.getElementById('total-streak').textContent = Math.round(totalStreak);
  
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const possibleDays = habits.length * daysInMonth;
  const rate = possibleDays > 0 ? Math.round((monthTotal / possibleDays) * 100) : 0;
  document.getElementById('completion-rate').textContent = `${rate}%`;
  
  const bestHabit = Object.entries(habitCounts).sort((a, b) => b[1] - a[1])[0];
  document.getElementById('best-habit').textContent = bestHabit && bestHabit[1] > 0 ? bestHabit[0] : '-';
}

window.toggleDate = toggleDate;

window.changeMonth = function(delta) {
  currentMonth += delta;
  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  } else if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }
  render();
};

render();
</script>
