<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
    body { background: #f5f5f7; color: #111; min-height: 100vh; padding: 24px; }
    .container { max-width: 420px; margin: auto; }
    .header { margin-bottom: 24px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 6px; font-weight: 600; text-transform: capitalize; }
    h1 { font-size: 42px; font-weight: 900; letter-spacing: -2px; }
    .card { background: white; border-radius: 32px; padding: 22px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); margin-bottom: 18px; }
    .hero { background: #111; color: white; }
    .hero-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .percentage { font-size: 76px; font-weight: 900; letter-spacing: -6px; color: #34C759; line-height: 1; }
    .target { width: 78px; height: 78px; border-radius: 999px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; }
    .progress { height: 14px; background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#30D158,#34C759); border-radius: 999px; transition: .3s; }
    .hero-text { margin-top: 16px; color: rgba(255,255,255,0.7); font-weight: 500; line-height: 1.5; }
    .section-title { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 14px; }
    .habit { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-radius: 28px; background: white; margin-bottom: 12px; box-shadow: 0 10px 24px rgba(0,0,0,0.05); cursor: pointer; transition: .25s; }
    .habit.active { background: #111; color: white; }
    .habit-left { display: flex; align-items: center; gap: 14px; }
    .emoji { width: 56px; height: 56px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 26px; background: #f3f3f3; }
    .habit.active .emoji { background: rgba(255,255,255,0.08); }
    .habit-name { font-size: 18px; font-weight: 800; }
    .habit-goal { font-size: 13px; color: #777; margin-top: 4px; font-weight: 600; }
    .habit.active .habit-goal { color: rgba(255,255,255,0.55); }
    .check { width: 36px; height: 36px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-weight: 900; background: #f3f3f3; }
    .habit.active .check { background: #34C759; color: black; }
    .moods { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .mood { background: white; border-radius: 24px; padding: 16px; text-align: center; cursor: pointer; box-shadow: 0 10px 24px rgba(0,0,0,0.05); font-weight: 800; }
    .mood.active { background: #111; color: white; }
    .mood-emoji { font-size: 30px; margin-bottom: 8px; }
    textarea { width: 100%; min-height: 130px; border: none; border-radius: 28px; padding: 20px; resize: none; font-size: 15px; background: white; box-shadow: 0 10px 24px rgba(0,0,0,0.05); outline: none; }
    .calendar { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }
    .day { aspect-ratio: 1; border-radius: 18px; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; box-shadow: 0 6px 18px rgba(0,0,0,0.04); font-size: 12px; }
    .day.active { background: #111; color: white; }
    .score { font-size: 9px; margin-top: 3px; opacity: .6; }
    .footer { text-align: center; margin-top: 24px; color: #888; font-size: 12px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="subtitle" id="dateLabel">Oggi</div>
      <h1>Habit Tracker</h1>
    </div>
    <div class="card hero">
      <div class="hero-top">
        <div>
          <div class="subtitle" style="color:rgba(255,255,255,.5)">Completamento</div>
          <div class="percentage" id="percentage">0%</div>
        </div>
        <div class="target" id="targetBox">0/3</div>
      </div>
      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
      <div class="hero-text">Ti bastano 3 check al giorno. Niente perfezione, solo costanza.</div>
    </div>
    <div class="section-title">Abitudini</div><div id="habits"></div>
    <div class="section-title" style="margin-top:26px">Mood</div><div class="moods" id="moods"></div>
    <div class="section-title" style="margin-top:26px">Nota</div><textarea id="note" placeholder="Cosa salvo di oggi?"></textarea>
    <div class="section-title" style="margin-top:26px">Calendario</div><div class="calendar" id="calendar"></div>
    <div class="footer">Built with momentum ✨</div>
  </div>
  <script>
    const habits = [
      { id: 'run', name: 'Corsa', emoji: '🏃', goal: 3 },
      { id: 'gym', name: 'Palestra', emoji: '🏋️', goal: 2 },
      { id: 'walk', name: 'Camminata', emoji: '🚶', goal: 2 },
      { id: 'mobility', name: 'Mobilità', emoji: '🧘', goal: 2 },
      { id: 'food', name: 'Dieta', emoji: '🥗', goal: 5 },
      { id: 'sleep', name: 'Sonno', emoji: '🌙', goal: 6 },
    ];
    const moods = [
      { id: 'low', emoji: '😵‍💫', label: 'Scarico' },
      { id: 'ok', emoji: '🙂', label: 'Ok' },
      { id: 'good', emoji: '🔥', label: 'Bene' },
    ];
    const target = 3;
    const today = new Date().toISOString().slice(0,10);
    let selectedDay = today;
    let data = JSON.parse(localStorage.getItem('habit-tracker-html')) || {};
    function getDayData(day) { if (!data[day]) data[day] = { habits: {}, mood: 'ok', note: '' }; return data[day]; }
    function save() { localStorage.setItem('habit-tracker-html', JSON.stringify(data)); }
    function renderHabits() {
      const container = document.getElementById('habits'); container.innerHTML = '';
      const dayData = getDayData(selectedDay);
      habits.forEach(habit => {
        const active = dayData.habits[habit.id];
        const div = document.createElement('div'); div.className = `habit ${active ? 'active' : ''}`;
        div.innerHTML = `<div class="habit-left"><div class="emoji">${habit.emoji}</div><div><div class="habit-name">${habit.name}</div><div class="habit-goal">Goal: ${habit.goal}x settimana</div></div></div><div class="check">${active ? '✓' : '+'}</div>`;
        div.onclick = () => { dayData.habits[habit.id] = !dayData.habits[habit.id]; save(); renderAll(); };
        container.appendChild(div);
      });
    }
    function renderHero() {
      const dayData = getDayData(selectedDay);
      const completed = Object.values(dayData.habits).filter(Boolean).length;
      const percentage = Math.min(Math.round((completed / target) * 100),100);
      document.getElementById('percentage').innerText = percentage + '%';
      document.getElementById('targetBox').innerText = `${completed}/${target}`;
      document.getElementById('progressBar').style.width = percentage + '%';
    }
    function renderMoods() {
      const container = document.getElementById('moods'); container.innerHTML = '';
      const dayData = getDayData(selectedDay);
      moods.forEach(mood => {
        const active = dayData.mood === mood.id;
        const div = document.createElement('div'); div.className = `mood ${active ? 'active' : ''}`;
        div.innerHTML = `<div class="mood-emoji">${mood.emoji}</div><div>${mood.label}</div>`;
        div.onclick = () => { dayData.mood = mood.id; save(); renderAll(); };
        container.appendChild(div);
      });
    }
    function renderNote() {
      const note = document.getElementById('note'); note.value = getDayData(selectedDay).note;
      note.oninput = (e) => { getDayData(selectedDay).note = e.target.value; save(); };
    }
    function renderCalendar() {
      const calendar = document.getElementById('calendar'); calendar.innerHTML = '';
      for(let i=0;i<30;i++) {
        const d = new Date(); d.setDate(d.getDate()-i);
        const key = d.toISOString().slice(0,10);
        const dayData = getDayData(key);
        const completed = Object.values(dayData.habits).filter(Boolean).length;
        const percentage = Math.min(Math.round((completed / target) * 100),100);
        const div = document.createElement('div'); div.className = `day ${selectedDay === key ? 'active' : ''}`;
        div.innerHTML = `<div>${d.getDate()}</div><div class="score">${percentage}%</div>`;
        div.onclick = () => { selectedDay = key; renderAll(); };
        calendar.appendChild(div);
      }
    }
    function renderDate() {
      const label = document.getElementById('dateLabel');
      const date = new Date(selectedDay + 'T12:00:00');
      label.innerText = date.toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long' });
    }
    function renderAll() { renderDate(); renderHero(); renderHabits(); renderMoods(); renderNote(); renderCalendar(); save(); }
    renderAll();
  </script>
</body>
</html>
